<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Merge Drop - スイカゲーム風パズル -</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Matter.js for physics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;800&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', 'M PLUS Rounded 1c', sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            overscroll-behavior: none; /* スマホでのスクロール防止 */
            touch-action: none; /* タッチ操作時のブラウザデフォルト動作を防止 */
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 100dvh;
            max-height: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        /* プレイエリアのグラスモーフィズム */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* キャンバスのアウトライン（ネオン風） */
        canvas {
            border-left: 2px solid rgba(138, 43, 226, 0.5);
            border-right: 2px solid rgba(138, 43, 226, 0.5);
            border-bottom: 2px solid rgba(138, 43, 226, 0.5);
            border-radius: 0 0 16px 16px;
            box-shadow: inset 0 -10px 20px rgba(138, 43, 226, 0.1);
            background-color: rgba(0, 0, 0, 0.2);
        }

        /* テキストのネオン発光 */
        .neon-text {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(138, 43, 226, 0.8);
        }
    </style>
</head>
<body class="text-white h-screen w-screen flex items-center justify-center p-2 sm:p-4">

    <div id="game-container" class="glass-panel rounded-2xl relative">
        
        <!-- UI Header -->
        <div class="flex justify-between items-center p-4 border-b border-white/10 z-10 relative">
            <div>
                <p class="text-xs text-gray-400 font-bold tracking-widest">SCORE</p>
                <p id="score-display" class="text-3xl font-extrabold neon-text">0</p>
            </div>
            <div class="text-right flex flex-col items-end">
                <p class="text-xs text-gray-400 font-bold tracking-widest mb-1">NEXT</p>
                <div class="w-12 h-12 rounded-full glass-panel flex items-center justify-center border border-white/20">
                    <span id="next-fruit-display" class="text-2xl drop-shadow-lg">🍒</span>
                </div>
            </div>
        </div>

        <!-- Canvas Wrapper -->
        <div class="flex-1 relative w-full flex justify-center items-end pb-2 px-2">
            <!-- ゲームオーバーライン -->
            <div class="absolute w-full h-[2px] bg-red-500/50 top-[15%] left-0 z-0 border-t border-red-400/80 shadow-[0_0_10px_rgba(239,68,68,0.8)] border-dashed"></div>
            
            <canvas id="game-canvas" class="w-full h-full z-10"></canvas>
        </div>

        <!-- Game Over Overlay -->
        <div id="game-over-screen" class="absolute inset-0 bg-black/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-500">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 mb-2 drop-shadow-lg">GAME OVER</h1>
            <p class="text-gray-300 mb-8">FINAL SCORE: <span id="final-score" class="text-white font-bold text-2xl neon-text">0</span></p>
            <button id="restart-btn" class="px-8 py-3 rounded-full bg-gradient-to-r from-purple-600 to-blue-600 font-bold text-lg hover:from-purple-500 hover:to-blue-500 transform hover:scale-105 transition-all shadow-[0_0_20px_rgba(138,43,226,0.6)]">
                もう一度プレイ
            </button>
        </div>
        
        <!-- Evolution Guide -->
        <div class="absolute bottom-2 left-0 w-full text-center pointer-events-none opacity-30 text-[10px] hidden sm:block">
            🍒→🍓→🍇→🍊→🍋→🍎→🍐→🍑→🍍→🍈→🍉
        </div>
    </div>

    <script>
        // フルーツの定義 (絵文字、半径、スコア、色)
        const FRUITS = [
            { id: 0, emoji: '🍒', radius: 15, score: 1 },
            { id: 1, emoji: '🍓', radius: 24, score: 3 },
            { id: 2, emoji: '🍇', radius: 34, score: 6 },
            { id: 3, emoji: '🍊', radius: 46, score: 10 },
            { id: 4, emoji: '🍋', radius: 58, score: 15 },
            { id: 5, emoji: '🍎', radius: 72, score: 21 },
            { id: 6, emoji: '🍐', radius: 88, score: 28 },
            { id: 7, emoji: '🍑', radius: 106, score: 36 },
            { id: 8, emoji: '🍍', radius: 126, score: 45 },
            { id: 9, emoji: '🍈', radius: 148, score: 55 },
            { id: 10, emoji: '🍉', radius: 175, score: 66 } // 最大サイズ
        ];

        // 状態管理
        let score = 0;
        let isGameOver = false;
        let canDrop = true;
        let nextFruitId = 0;
        let currentDropX = 0;
        let mouseX = 0;

        // Matter.jsのエイリアス
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Body = Matter.Body,
              Composite = Matter.Composite,
              Events = Matter.Events,
              Vector = Matter.Vector;

        // セットアップ
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const container = canvas.parentElement;
        
        // 解像度を高くして綺麗に描画する
        const pixelRatio = window.devicePixelRatio || 1;
        let width = container.clientWidth;
        let height = container.clientHeight;
        
        canvas.width = width * pixelRatio;
        canvas.height = height * pixelRatio;
        ctx.scale(pixelRatio, pixelRatio);

        // ゲームオーバーラインのY座標 (上から15%)
        const gameOverY = height * 0.15;

        // 物理エンジンの初期化
        const engine = Engine.create();
        engine.world.gravity.y = 1.2; // 少し重力を強めにしてサクサク落とす

        // 壁の作成
        const wallOptions = { isStatic: true, render: { visible: false }, friction: 0.2 };
        const ground = Bodies.rectangle(width / 2, height + 50, width * 2, 100, wallOptions);
        const leftWall = Bodies.rectangle(-50, height / 2, 100, height * 2, wallOptions);
        const rightWall = Bodies.rectangle(width + 50, height / 2, 100, height * 2, wallOptions);
        
        Composite.add(engine.world, [ground, leftWall, rightWall]);

        // ランナーの開始
        const runner = Runner.create();
        Runner.run(runner, engine);

        // 次のフルーツをランダムに決定 (🍒〜🍋まで)
        function generateNextFruit() {
            return Math.floor(Math.random() * 5);
        }

        // スコア更新
        function addScore(points) {
            score += points;
            document.getElementById('score-display').innerText = score;
            // 少しアニメーション効果
            const scoreEl = document.getElementById('score-display');
            scoreEl.style.transform = 'scale(1.2)';
            setTimeout(() => scoreEl.style.transform = 'scale(1)', 100);
        }

        // フルーツ生成関数
        function createFruit(x, y, fruitData, isDrop = false) {
            const body = Bodies.circle(x, y, fruitData.radius, {
                restitution: 0.2,  // 弾みやすさ
                friction: 0.5,     // 摩擦
                density: 0.005,    // 密度
                isSensor: isDrop,  // 落下前はセンサー(衝突しない)
                label: `fruit-${fruitData.id}`,
                plugin: {
                    fruitId: fruitData.id,
                    emoji: fruitData.emoji,
                    radius: fruitData.radius
                }
            });
            Composite.add(engine.world, body);
            return body;
        }

        // 落下準備用のフルーツ
        let currentDropBody = null;

        function initDrop() {
            if(isGameOver) return;
            const fruitData = FRUITS[nextFruitId];
            
            // 次のフルーツの表示更新
            nextFruitId = generateNextFruit();
            document.getElementById('next-fruit-display').innerText = FRUITS[nextFruitId].emoji;

            // マウス位置に制限をかける（壁にめり込まないように）
            const safeX = Math.max(fruitData.radius, Math.min(mouseX || width / 2, width - fruitData.radius));
            
            currentDropBody = createFruit(safeX, 50, fruitData, true);
            Body.setStatic(currentDropBody, true); // 空中で静止させる
            canDrop = true;
        }

        // ドロップ処理
        function dropFruit() {
            if (!canDrop || !currentDropBody || isGameOver) return;
            canDrop = false;
            
            Body.setStatic(currentDropBody, false);
            currentDropBody.isSensor = false;
            
            // 下方向へ少し初速をつける
            Body.setVelocity(currentDropBody, { x: 0, y: 2 });
            
            currentDropBody = null;

            // クールダウン後に次を準備
            setTimeout(initDrop, 1000);
        }

        // 衝突・マージ判定
        Events.on(engine, 'collisionStart', (event) => {
            const pairs = event.pairs;

            for (let i = 0; i < pairs.length; i++) {
                const bodyA = pairs[i].bodyA;
                const bodyB = pairs[i].bodyB;

                // 既にマージ処理中のボディはスキップ
                if (bodyA.isMerging || bodyB.isMerging) continue;

                if (bodyA.label.startsWith('fruit-') && bodyA.label === bodyB.label) {
                    const fruitId = bodyA.plugin.fruitId;
                    
                    // スイカ(最大)同士は消えるだけにするか、そのままにするか。今回はそのまま残す仕様
                    if (fruitId >= FRUITS.length - 1) continue;

                    // マージ処理開始フラグ
                    bodyA.isMerging = true;
                    bodyB.isMerging = true;

                    // 中間地点の計算
                    const midX = (bodyA.position.x + bodyB.position.x) / 2;
                    const midY = (bodyA.position.y + bodyB.position.y) / 2;

                    // 古いものを削除
                    Composite.remove(engine.world, [bodyA, bodyB]);

                    // 新しいフルーツを生成
                    const nextFruit = FRUITS[fruitId + 1];
                    const newBody = createFruit(midX, midY, nextFruit, false);
                    
                    // スコア加算
                    addScore(nextFruit.score);
                }
            }
        });

        // ゲームオーバー判定ループ
        setInterval(() => {
            if (isGameOver) return;
            
            const bodies = Composite.allBodies(engine.world);
            for (let i = 0; i < bodies.length; i++) {
                const body = bodies[i];
                // 落下中のもの（sensor）や壁は除外
                if (body.isStatic || body.isSensor || !body.label.startsWith('fruit-')) continue;

                // ゲームオーバーラインを超えていて、かつ動きが止まっている場合
                if (body.position.y - body.circleRadius < gameOverY && body.velocity.y < 0.5 && body.velocity.y > -0.5) {
                    triggerGameOver();
                    break;
                }
            }
        }, 1000);

        function triggerGameOver() {
            isGameOver = true;
            canDrop = false;
            
            // 物理エンジンの動きを止める
            Runner.stop(runner);
            
            document.getElementById('final-score').innerText = score;
            const gameOverScreen = document.getElementById('game-over-screen');
            gameOverScreen.classList.remove('hidden');
            // 少し遅らせてフェードイン
            setTimeout(() => {
                gameOverScreen.classList.remove('opacity-0');
            }, 50);
        }

        // リスタート
        document.getElementById('restart-btn').addEventListener('click', () => {
            // UIのリセット
            const gameOverScreen = document.getElementById('game-over-screen');
            gameOverScreen.classList.add('opacity-0');
            setTimeout(() => gameOverScreen.classList.add('hidden'), 500);
            
            score = 0;
            document.getElementById('score-display').innerText = score;
            isGameOver = false;

            // 物理ワールドのクリア
            Composite.clear(engine.world);
            Engine.clear(engine);
            
            // 壁を再配置
            Composite.add(engine.world, [ground, leftWall, rightWall]);
            
            // 再開
            Runner.run(runner, engine);
            nextFruitId = generateNextFruit();
            initDrop();
        });

        // 入力制御
        function updateDropPosition(x) {
            if (!canDrop || !currentDropBody) return;
            mouseX = x;
            const radius = currentDropBody.plugin.radius;
            // 画面端からはみ出ないように計算
            const safeX = Math.max(radius, Math.min(x, width - radius));
            Body.setPosition(currentDropBody, { x: safeX, y: currentDropBody.position.y });
        }

        // PCマウス
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            updateDropPosition(e.clientX - rect.left);
        });
        canvas.addEventListener('mousedown', dropFruit);

        // スマホタッチ
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); // スクロール防止
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            updateDropPosition(touch.clientX - rect.left);
        }, { passive: false });
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            dropFruit();
        }, { passive: false });


        // カスタムレンダリングループ (Matter.js内蔵ではなくCanvas APIで綺麗に描く)
        function render() {
            // 背景クリア (透明にしてCSSの背景を見せる)
            ctx.clearRect(0, 0, width, height);

            const bodies = Composite.allBodies(engine.world);

            for (let i = 0; i < bodies.length; i++) {
                const body = bodies[i];
                if (!body.plugin || !body.plugin.emoji) continue;

                const { x, y } = body.position;
                const angle = body.angle;
                const radius = body.plugin.radius;
                const emoji = body.plugin.emoji;

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);

                // 絵文字を描画
                ctx.font = `${radius * 1.6}px 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // ドロップ前のアイテムは半透明＋点滅エフェクトっぽく
                if (body.isSensor) {
                    ctx.globalAlpha = 0.8;
                    // 落とす予測線を引く
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(0, height);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.setLineDash([5, 5]);
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // シャドウをつけて立体感を出す
                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 4;

                ctx.fillText(emoji, 0, radius * 0.1); // 微調整(絵文字によって中心がズレるため)

                ctx.restore();
            }

            requestAnimationFrame(render);
        }

        // リサイズ対応
        window.addEventListener('resize', () => {
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width * pixelRatio;
            canvas.height = height * pixelRatio;
            ctx.scale(pixelRatio, pixelRatio);
            
            // 壁と床の再配置
            Body.setPosition(ground, { x: width / 2, y: height + 50 });
            Body.setPosition(rightWall, { x: width + 50, y: height / 2 });
            // ※既存のフルーツの座標はそのままになるため、リサイズで壁外に出る可能性はあるが簡易実装として許容
        });

        // ゲーム開始
        nextFruitId = generateNextFruit();
        initDrop();
        render(); // 描画ループ開始

    </script>
</body>
</html>
